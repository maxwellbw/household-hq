<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%icon.svg" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.png" />
    <!-- Feature 032 US1: media-scoped fallbacks for the instant before the pre-paint
         script runs; useTheme then keeps both in sync with the app's active theme.
         Values mirror the --bg tokens in src/index.css — change them together. -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#FAF6F0" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#201C16" />
    <!-- Feature 032 US1: stamp data-theme before first paint (quickstart §1 case 2 —
         a dark cold load must never flash the light theme). Mirrors useTheme's
         resolution: explicit hq.theme wins, else the OS scheme. -->
    <script>
      ;(function () {
        var pref = null
        try {
          pref = localStorage.getItem('hq.theme')
        } catch (e) {}
        var resolved =
          pref === 'light' || pref === 'dark'
            ? pref
            : window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light'
        document.documentElement.setAttribute('data-theme', resolved)
      })()
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Household HQ" />
    <!-- No maximum-scale/user-scalable=no: locking zoom fails WCAG 1.4.4 (axe
         `meta-viewport`, feature 032 T033). These flags were suppressing iOS's
         focus auto-zoom on sub-16px inputs; index.css now bumps form controls to
         16px on coarse pointers instead, which removes the cause rather than
         disabling the user's ability to zoom. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Household HQ</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
